<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <link rel='stylesheet' href='https://cdn-uicons.flaticon.com/uicons-regular-rounded/css/uicons-regular-rounded.css'>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Canvas Kids - Alphabets | Learn A to Z</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- Font Awesome 6 (Free Icons) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* ========== GLOBAL STYLES ========== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary-color: #ff5e7e;
            --secondary-color: #4dc2ff;
            --accent-color: #ffc93c;
            --success-color: #5deb7a;
            --warning-color: #ffa500;
            --bg-color: #f0f8ff;
            --nav-bg: #ffffff;
            --text-main: #333333;
            --text-muted: #666666;
            --card-bg: #ffffff;
            --card-shadow: 0 8px 24px rgba(0, 0, 0, 0.1);
            --hover-shadow: 0 12px 32px rgba(0, 0, 0, 0.15);
            --border-radius: 20px;
            --transition: all 0.3s ease;
        }

        body.dark-theme {
            --primary-color: #ff476c;
            --secondary-color: #29b6f6;
            --accent-color: #ffca28;
            --success-color: #66bb6a;
            --warning-color: #ffa726;
            --bg-color: #121212;
            --nav-bg: #1e1e1e;
            --text-main: #f0f0f0;
            --text-muted: #aaaaaa;
            --card-bg: #2d2d2d;
            --card-shadow: 0 8px 24px rgba(0, 0, 0, 0.4);
            --hover-shadow: 0 12px 32px rgba(0, 0, 0, 0.6);
        }

        body {
            font-family: 'Fredoka', 'Segoe UI', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            transition: var(--transition);
            overflow-x: hidden;
        }

        /* Navigation */
        #top-nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 30px;
            background-color: var(--nav-bg);
            box-shadow: var(--card-shadow);
            position: sticky;
            top: 0;
            z-index: 1000;
            border-bottom-left-radius: 20px;
            border-bottom-right-radius: 20px;
            transition: var(--transition);
        }

        .nav-left,
        .nav-right {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .nav-logo {
            font-size: 28px;
            color: var(--primary-color);
            font-weight: 700;
        }

        .nav-btn {
            background: var(--bg-color);
            color: var(--secondary-color);
            border: none;
            width: 45px;
            height: 45px;
            border-radius: 50%;
            font-size: 20px;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.05);
            transition: var(--transition);
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .nav-btn:hover {
            transform: scale(1.1);
            box-shadow: 0 6px 15px rgba(0, 0, 0, 0.1);
        }

        .nav-btn.off {
            color: var(--warning-color);
            opacity: 0.7;
        }

        /* Main Content */
        #app-content {
            padding: 30px;
            max-width: 1200px;
            margin: 0 auto;
        }

        .view-section {
            display: block;
            animation: fadeIn 0.5s ease-in-out;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Section Header */
        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
            background: var(--card-bg);
            padding: 15px 25px;
            border-radius: var(--border-radius);
            box-shadow: var(--card-shadow);
        }

        .section-header h2 {
            color: var(--primary-color);
            font-size: 32px;
        }

        /* Grid Container */
        .grid-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            gap: 20px;
        }

        /* Alphabet Card - with Font Awesome icon */
        .alphabet-card {
            background: var(--card-bg);
            border-radius: var(--border-radius);
            padding: 20px 15px;
            text-align: center;
            cursor: pointer;
            box-shadow: var(--card-shadow);
            transition: var(--transition);
            border: 3px solid transparent;
        }

        .alphabet-card:hover {
            transform: scale(1.05);
            box-shadow: var(--hover-shadow);
            border-color: var(--secondary-color);
        }

        .alphabet-card .letter-icon {
            font-size: 55px;
            color: var(--primary-color);
            margin-bottom: 12px;
            display: inline-block;
        }

        .alphabet-card h1 {
            font-size: 48px;
            margin-bottom: 8px;
            color: var(--text-main);
        }

        .alphabet-card .word-text {
            font-size: 18px;
            font-weight: 600;
            color: var(--secondary-color);
            background: rgba(77, 194, 255, 0.15);
            display: inline-block;
            padding: 5px 12px;
            border-radius: 40px;
            margin-top: 8px;
        }

        /* Bounce animation */
        .btn-bounce:hover {
            animation: bounce 0.5s infinite alternate;
        }

        @keyframes bounce {
            from {
                transform: translateY(0);
            }

            to {
                transform: translateY(-8px);
            }
        }

        /* Responsive */
        @media (max-width: 768px) {
            #top-nav {
                padding: 10px 15px;
            }

            .nav-logo {
                font-size: 22px;
            }

            #app-content {
                padding: 20px;
            }

            .section-header h2 {
                font-size: 26px;
            }

            .grid-container {
                grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
                gap: 15px;
            }

            .alphabet-card h1 {
                font-size: 38px;
            }
        }
    </style>
</head>

<body>
    <nav id="top-nav">
        <div class="nav-left">
            <button id="btn-home" class="nav-btn" onclick="window.location.href='index.html'" aria-label="Home"
                title="Home">
                <i class="fa-solid fa-house"></i>
            </button>
            <h1 class="nav-logo">Canvas Kids</h1>
        </div>
        <div class="nav-right">
            <button id="btn-bgm" class="nav-btn" aria-label="Background Music"><i
                    class="fa-solid fa-music"></i></button>
            <button id="btn-sound" class="nav-btn" aria-label="Sound"><i class="fa-solid fa-volume-high"></i></button>
            <button id="btn-theme" class="nav-btn" aria-label="Dark/Light Mode"><i
                    class="fa-solid fa-moon"></i></button>
        </div>
    </nav>

    <main id="app-content">
        <section id="sec-alphabets" class="view-section active">
            <div class="section-header">
                <h2><i class="fa-solid fa-font" style="margin-right: 12px;"></i> Alphabets A to Z</h2>
                <button class="nav-btn btn-bounce" onclick="speakMessage('A to Z, lets learn the alphabet with fun!')">
                    <i class="fa-solid fa-repeat"></i>
                </button>
            </div>
            <div class="grid-container" id="alphabets-grid"></div>
        </section>
    </main>

    <audio id="bgm-player" loop>
        <source src="https://assets.mixkit.co/music/preview/mixkit-funny-puppy-music-loop-2746.mp3" type="audio/mpeg">
    </audio>

    <script>
        // ========== ALPHABETS DATA with Font Awesome Icons & Simple Words ==========
        const alphabetsData = [
            { letter: 'A', word: 'Apple', icon: 'fa-apple-whole', iconColor: '#e53935' },
            { letter: 'B', word: 'Ball', icon: 'fa-futbol', iconColor: '#ff9800' },
            { letter: 'C', word: 'Cat', icon: 'fa-cat', iconColor: '#ffb300' },
            { letter: 'D', word: 'Dog', icon: 'fa-dog', iconColor: '#8d6e63' },
            { letter: 'E', word: 'Elephant', icon: 'fa-brands fa-evernote', iconColor: '#607d8b' },
            { letter: 'F', word: 'Fish', icon: 'fa-fish', iconColor: '#29b6f6' },
            { letter: 'G', word: 'Goat', icon: 'fa-solid fa-cow', iconColor: '#9c27b0' },
            { letter: 'H', word: 'Hat', icon: 'fa-hat-cowboy', iconColor: '#ff5722' },
            { letter: 'I', word: 'Ice Cream', icon: 'fa-ice-cream', iconColor: '#ff80ab' },
            { letter: 'J', word: 'Jelly', icon: 'fa-candy-cane', iconColor: '#e91e63' },
            { letter: 'K', word: 'Kite', icon: 'fa-solid fa-diamond', iconColor: '#00bcd4' },
            { letter: 'L', word: 'Lion', icon: 'fa-dragon', iconColor: '#ffa000' },
            { letter: 'M', word: 'Mobile', icon: 'fa-solid fa-mobile', iconColor: '#795548' }, // Using Flaticon
            { letter: 'N', word: 'Nest', icon: 'fa-brands fa-battle-net', iconColor: '#4caf50' },
            { letter: 'O', word: 'Orange', icon: 'fa-circle', iconColor: '#ff9800' },
            { letter: 'P', word: 'Pan', icon: 'fa-solid fa-drum-steelpan', iconColor: '#424242' },
            { letter: 'Q', word: 'Queen', icon: 'fa-crown', iconColor: '#ffc107' },
            { letter: 'R', word: 'Rainbow', icon: 'fa-solid fa-rainbow', iconColor: '#f48fb1' },
            { letter: 'S', word: 'Sun', icon: 'fa-sun', iconColor: '#ffca28' },
            { letter: 'T', word: 'Tiger', icon: 'fa-paw', iconColor: '#ff7043' },
            { letter: 'U', word: 'Umbrella', icon: 'fa-umbrella', iconColor: '#5c6bc0' },
            { letter: 'V', word: 'Violin', icon: 'fa-music', iconColor: '#ab47bc' },
            { letter: 'W', word: 'Watermelon', icon: '<fa-solid fa-egg', iconColor: '#66bb6a' },
            { letter: 'X', word: 'X-ray', icon: 'fa-x-ray', iconColor: '#26c6da' },
            { letter: 'Y', word: 'Yak', icon: 'fa-horse-head', iconColor: '#a1887f' },
            { letter: 'Z', word: 'Zebra', icon: 'fa-solid fa-democrat', iconColor: '#78909c' }
        ];

        // ========== APP STATE ==========
        const AppState = {
            isBgmOn: false,
            isSoundOn: true,
            isDarkMode: false
        };

        // DOM Elements
        const bgmPlayer = document.getElementById('bgm-player');
        const btnBgm = document.getElementById('btn-bgm');
        const btnSound = document.getElementById('btn-sound');
        const btnTheme = document.getElementById('btn-theme');

        // ========== SPEECH FUNCTION ==========
        function speakMessage(text) {
            if (!AppState.isSoundOn) return;
            if (!('speechSynthesis' in window)) return;
            window.speechSynthesis.cancel();
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = 'en-US';
            utterance.rate = 0.9;
            utterance.pitch = 1.1;
            window.speechSynthesis.speak(utterance);
        }

        // Simple click sound effect (using Web Audio)
        function playClickSound() {
            if (!AppState.isSoundOn) return;
            try {
                const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                const oscillator = audioCtx.createOscillator();
                const gainNode = audioCtx.createGain();
                oscillator.connect(gainNode);
                gainNode.connect(audioCtx.destination);
                oscillator.type = 'sine';
                oscillator.frequency.setValueAtTime(800, audioCtx.currentTime);
                oscillator.frequency.exponentialRampToValueAtTime(1200, audioCtx.currentTime + 0.1);
                gainNode.gain.setValueAtTime(0.08, audioCtx.currentTime);
                gainNode.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.15);
                oscillator.start();
                oscillator.stop(audioCtx.currentTime + 0.15);
            } catch (e) { console.log("Audio not supported"); }
        }

        // Confetti effect for fun celebration
        function triggerConfetti() {
            if (!AppState.isSoundOn) return;
            const canvas = document.createElement('canvas');
            canvas.style.position = 'fixed';
            canvas.style.top = '0';
            canvas.style.left = '0';
            canvas.style.width = '100vw';
            canvas.style.height = '100vh';
            canvas.style.pointerEvents = 'none';
            canvas.style.zIndex = '9999';
            document.body.appendChild(canvas);

            const ctx = canvas.getContext('2d');
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;

            const pieces = [];
            const colors = ['#ff5e7e', '#4dc2ff', '#ffc93c', '#5deb7a', '#ffa500', '#e91e63'];
            for (let i = 0; i < 80; i++) {
                pieces.push({
                    x: canvas.width / 2,
                    y: canvas.height / 2,
                    vx: (Math.random() - 0.5) * 18,
                    vy: (Math.random() - 1) * 18 - 8,
                    size: Math.random() * 8 + 4,
                    color: colors[Math.floor(Math.random() * colors.length)],
                    rotation: Math.random() * 360,
                    rs: (Math.random() - 0.5) * 12
                });
            }
            let opacity = 1;
            function animate() {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                let active = false;
                for (let p of pieces) {
                    p.x += p.vx;
                    p.y += p.vy;
                    p.vy += 0.4;
                    p.rotation += p.rs;
                    ctx.save();
                    ctx.translate(p.x, p.y);
                    ctx.rotate(p.rotation * Math.PI / 180);
                    ctx.fillStyle = p.color;
                    ctx.globalAlpha = opacity;
                    ctx.fillRect(-p.size / 2, -p.size / 2, p.size, p.size);
                    ctx.restore();
                    if (p.y < canvas.height) active = true;
                }
                if (active && opacity > 0) {
                    opacity -= 0.008;
                    requestAnimationFrame(animate);
                } else {
                    document.body.removeChild(canvas);
                }
            }
            animate();
        }

        // ========== GENERATE ALPHABET CARDS ==========
        function generateAlphabetCards() {
            const grid = document.getElementById('alphabets-grid');
            if (!grid) return;
            grid.innerHTML = '';

            alphabetsData.forEach(item => {
                const card = document.createElement('div');
                card.className = 'alphabet-card';
                // Font Awesome icon + letter + word
                card.innerHTML = `
                    <div class="letter-icon">
                        <i class="fa-solid ${item.icon}" style="font-size: 58px; color: ${item.iconColor};"></i>
                    </div>
                    <h1>${item.letter}</h1>
                    <div class="word-text">
                        <i class=" " style="font-size: 12px; margin-right: 6px;"></i>
                        ${item.word}
                    </div>
                `;

                card.onclick = () => {
                    playClickSound();
                    triggerConfetti();
                    speakMessage(`${item.letter} for ${item.word}`);
                };

                grid.appendChild(card);
            });
        }

        // ========== THEME TOGGLE ==========
        function initTheme() {
            const savedTheme = localStorage.getItem('canvasKidsTheme');
            if (savedTheme === 'dark') {
                AppState.isDarkMode = true;
                document.body.classList.add('dark-theme');
                btnTheme.innerHTML = '<i class="fa-solid fa-sun"></i>';
            } else {
                document.body.classList.remove('dark-theme');
                btnTheme.innerHTML = '<i class="fa-solid fa-moon"></i>';
            }
        }

        function toggleTheme() {
            AppState.isDarkMode = !AppState.isDarkMode;
            if (AppState.isDarkMode) {
                document.body.classList.add('dark-theme');
                btnTheme.innerHTML = '<i class="fa-solid fa-sun"></i>';
                localStorage.setItem('canvasKidsTheme', 'dark');
            } else {
                document.body.classList.remove('dark-theme');
                btnTheme.innerHTML = '<i class="fa-solid fa-moon"></i>';
                localStorage.setItem('canvasKidsTheme', 'light');
            }
            playClickSound();
        }

        // ========== SOUND TOGGLE ==========
        function toggleSound() {
            AppState.isSoundOn = !AppState.isSoundOn;
            if (AppState.isSoundOn) {
                btnSound.innerHTML = '<i class="fa-solid fa-volume-high"></i>';
                btnSound.classList.remove('off');
                speakMessage('Sound on!');
            } else {
                btnSound.innerHTML = '<i class="fa-solid fa-volume-xmark"></i>';
                btnSound.classList.add('off');
                window.speechSynthesis.cancel();
            }
            playClickSound();
        }

        // ========== BGM TOGGLE ==========
        function toggleBgm() {
            AppState.isBgmOn = !AppState.isBgmOn;
            if (AppState.isBgmOn) {
                bgmPlayer.play().catch(e => console.log('Autoplay prevented'));
                btnBgm.innerHTML = '<i class="fa-solid fa-music"></i>';
                btnBgm.classList.remove('off');
            } else {
                bgmPlayer.pause();
                btnBgm.innerHTML = '<i class="fa-solid fa-music" style="opacity:0.5;"></i>';
                btnBgm.classList.add('off');
            }
            playClickSound();
        }

        // ========== EVENT LISTENERS ==========
        function bindEvents() {
            if (btnBgm) btnBgm.addEventListener('click', toggleBgm);
            if (btnSound) btnSound.addEventListener('click', toggleSound);
            if (btnTheme) btnTheme.addEventListener('click', toggleTheme);
        }

        // ========== INITIALIZE PAGE ==========
        function init() {
            generateAlphabetCards();
            bindEvents();
            initTheme();
            // Set initial BGM button style
            btnBgm.classList.add('off');
            btnBgm.innerHTML = '<i class="fa-solid fa-music" style="opacity:0.5;"></i>';
            // Welcome message
            setTimeout(() => {
                speakMessage('Welcome to Alphabets! Tap any letter to learn.');
            }, 500);
        }

        // Start everything when DOM is ready
        document.addEventListener('DOMContentLoaded', init);

        // Expose helper for inline button
        window.speakMessage = speakMessage;
        window.playClickSound = playClickSound;
        window.triggerConfetti = triggerConfetti;
    </script>
</body>

</html>
