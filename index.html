<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Canvas Kids - Learning Fun!</title>

    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        /* Base Variables and Theme 
   Using bright, attractive colors suitable for children. */
        :root {
            --primary-color: #ff5e7e;
            --secondary-color: #4dc2ff;
            --accent-color: #ffc93c;
            --success-color: #5deb7a;
            --warning-color: #ffa500;
            --bg-color: #f0f8ff;
            /* Alice Blue */
            --nav-bg: #ffffff;
            --text-main: #333333;
            --text-muted: #666666;
            --card-bg: #ffffff;
            --card-shadow: 0 8px 24px rgba(0, 0, 0, 0.1);
            --hover-shadow: 0 12px 32px rgba(0, 0, 0, 0.15);
            --border-radius: 20px;
            --transition: all 0.3s ease;
        }

        /* Dark Theme Overrides */
        body.dark-theme {
            --primary-color: #ff476c;
            --secondary-color: #29b6f6;
            --accent-color: #ffca28;
            --success-color: #66bb6a;
            --warning-color: #ffa726;
            --bg-color: #121212;
            --nav-bg: #1e1e1e;
            --text-main: #f0f0f0;
            --text-muted: #aaaaaa;
            --card-bg: #2d2d2d;
            --card-shadow: 0 8px 24px rgba(0, 0, 0, 0.4);
            --hover-shadow: 0 12px 32px rgba(0, 0, 0, 0.6);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Fredoka', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            transition: background-color 0.4s ease, color 0.4s ease;
            overflow-x: hidden;
        }

        /* Navigation */
        #top-nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 30px;
            background-color: var(--nav-bg);
            box-shadow: var(--card-shadow);
            position: sticky;
            top: 0;
            z-index: 1000;
            border-bottom-left-radius: 20px;
            border-bottom-right-radius: 20px;
            transition: var(--transition);
        }

        .nav-left,
        .nav-right {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .nav-logo {
            font-size: 28px;
            color: var(--primary-color);
            font-weight: 700;
        }

        .nav-btn {
            background: var(--bg-color);
            color: var(--secondary-color);
            border: none;
            width: 45px;
            height: 45px;
            border-radius: 50%;
            font-size: 20px;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.05);
            transition: var(--transition);
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .nav-btn:hover {
            transform: scale(1.1);
            box-shadow: 0 6px 15px rgba(0, 0, 0, 0.1);
        }

        .nav-btn.off {
            color: var(--warning-color);
            opacity: 0.7;
        }

        /* Empty ruleset removed */

        /* App Content */
        #app-content {
            padding: 30px;
            max-width: 1200px;
            margin: 0 auto;
        }

        /* Sections */
        .view-section {
            display: none;
            animation: fadeIn 0.5s ease-in-out;
        }

        .view-section.active {
            display: block;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Hero Header */
        .hero-header {
            text-align: center;
            margin-bottom: 40px;
            padding: 40px 20px;
            background: linear-gradient(135deg, var(--primary-color), var(--accent-color));
            color: #fff;
            border-radius: var(--border-radius);
            box-shadow: var(--card-shadow);
        }

        .hero-header h2 {
            font-size: 48px;
            margin-bottom: 15px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.2);
        }

        .hero-header p {
            font-size: 22px;
            margin-bottom: 25px;
        }

        /* Buttons */
        .primary-btn {
            background-color: var(--secondary-color);
            color: white;
            border: none;
            padding: 15px 30px;
            font-size: 24px;
            font-weight: 600;
            border-radius: 30px;
            cursor: pointer;
            box-shadow: 0 6px 15px rgba(0, 0, 0, 0.15);
            font-family: 'Fredoka', sans-serif;
            transition: var(--transition);
            display: inline-flex;
            align-items: center;
            gap: 10px;
        }

        .primary-btn:hover {
            background-color: #3bb2ec;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.2);
            transform: translateY(-3px);
        }

        /* Animations */
        .btn-bounce:hover {
            animation: bounce 0.5s infinite alternate;
        }

        @keyframes bounce {
            from {
                transform: translateY(0);
            }

            to {
                transform: translateY(-10px);
            }
        }

        /* Grid layout for Main Menu and standard grids */
        .sections-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 25px;
        }

        /* Category Card */
        .category-card {
            background-color: var(--card-bg);
            border-radius: var(--border-radius);
            padding: 25px;
            text-align: center;
            box-shadow: var(--card-shadow);
            cursor: pointer;
            transition: var(--transition);
            border-bottom: 5px solid var(--secondary-color);
        }

        .category-card:hover {
            transform: translateY(-10px) scale(1.02);
            box-shadow: var(--hover-shadow);
        }

        .category-card i.main-icon {
            font-size: 60px;
            color: var(--primary-color);
            margin-bottom: 15px;
            display: block;
        }

        .category-card h3 {
            font-size: 24px;
            margin-bottom: 5px;
        }

        .category-card p {
            font-size: 16px;
            color: var(--text-muted);
        }

        /* Responsive adjustments */
        @media (max-width: 768px) {
            #top-nav {
                padding: 10px 15px;
            }

            .hero-header h2 {
                font-size: 32px;
            }

            .nav-logo {
                font-size: 22px;
            }

            .view-section {
                padding-top: 10px;
            }
        }

        /* --- Section Specific Styles --- */
        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
            background: var(--card-bg);
            padding: 15px 25px;
            border-radius: var(--border-radius);
            box-shadow: var(--card-shadow);
        }

        .section-header h2 {
            color: var(--primary-color);
            font-size: 32px;
        }

        .grid-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 20px;
        }

        /* Alphabets Card */
        .alphabet-card {
            background: var(--card-bg);
            border-radius: var(--border-radius);
            padding: 20px 10px;
            text-align: center;
            cursor: pointer;
            box-shadow: var(--card-shadow);
            transition: var(--transition);
            border: 3px solid transparent;
        }

        .alphabet-card:hover {
            transform: scale(1.05);
            box-shadow: var(--hover-shadow);
            border-color: var(--secondary-color);
        }

        .alphabet-card h1 {
            font-size: 48px;
            margin-bottom: 10px;
            color: var(--text-main);
        }

        .alphabet-card i {
            font-size: 40px;
        }

        /* Numbers Layout */
        .numbers-horiz-scroll {
            display: flex;
            overflow-x: auto;
            gap: 15px;
            padding: 15px 5px;
        }

        .number-btn {
            flex: 0 0 auto;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            font-size: 28px;
            font-weight: bold;
            border: none;
            background: var(--secondary-color);
            color: white;
            cursor: pointer;
            box-shadow: var(--card-shadow);
            transition: var(--transition);
        }

        .number-btn:hover {
            transform: scale(1.1);
        }

        .visual-display-box {
            background: var(--card-bg);
            padding: 30px;
            border-radius: var(--border-radius);
            text-align: center;
            margin-top: 20px;
            min-height: 200px;
            box-shadow: var(--card-shadow);
        }

        .visual-display-box h3 {
            font-size: 36px;
            color: var(--primary-color);
            margin-bottom: 20px;
        }

        #visual-objects-container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 15px;
        }

        .visual-object {
            font-size: 40px;
            color: var(--warning-color);
            animation: popIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes popIn {
            0% {
                transform: scale(0);
                opacity: 0;
            }

            100% {
                transform: scale(1);
                opacity: 1;
            }
        }

        .numbers-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(60px, 1fr));
            gap: 10px;
        }

        .numbers-grid .number-btn {
            width: 100%;
            border-radius: 10px;
            background: var(--accent-color);
            color: var(--text-main);
        }

        /* Colors & Marathi Cards */
        .color-card {
            height: 150px;
            border-radius: var(--border-radius);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            box-shadow: var(--card-shadow);
            transition: var(--transition);
        }

        .color-card:hover {
            transform: scale(1.05);
        }

        .color-card h3 {
            font-size: 28px;
            text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.5);
        }

        .marathi-card {
            background: var(--card-bg);
            border-radius: var(--border-radius);
            padding: 20px 10px;
            text-align: center;
            cursor: pointer;
            box-shadow: var(--card-shadow);
            transition: var(--transition);
            color: var(--primary-color);
        }

        .marathi-card:hover {
            background: var(--primary-color);
            color: white;
            transform: scale(1.05);
        }

        .marathi-card h1 {
            font-size: 48px;
        }

        .marathi-card p {
            font-size: 20px;
            font-weight: bold;
            margin-top: 5px;
        }

        /* Body Parts Diagram */
        .body-diagram {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
            background: var(--card-bg);
            padding: 30px;
            border-radius: var(--border-radius);
            box-shadow: var(--card-shadow);
        }

        .body-row {
            display: flex;
            justify-content: center;
            gap: 15px;
            width: 100%;
        }

        .body-part-btn {
            background: var(--bg-color);
            border: 2px solid var(--secondary-color);
            color: var(--text-main);
            padding: 15px 25px;
            border-radius: 30px;
            font-size: 20px;
            font-weight: bold;
            cursor: pointer;
            transition: var(--transition);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .body-part-btn i {
            color: var(--primary-color);
        }

        .body-part-btn:hover {
            background: var(--secondary-color);
            color: white;
            transform: scale(1.1);
        }

        .body-part-btn:hover i {
            color: white;
        }

        /* Genders Cards */
        .gender-card {
            background: var(--card-bg);
            border-radius: var(--border-radius);
            padding: 20px;
            text-align: center;
            box-shadow: var(--card-shadow);
            transition: var(--transition);
        }

        .gender-card h3 {
            margin-bottom: 15px;
            font-size: 26px;
            color: var(--primary-color);
        }

        .gender-pair {
            display: flex;
            justify-content: space-around;
        }

        .gender-item {
            cursor: pointer;
            transition: var(--transition);
            padding: 15px;
            border-radius: 15px;
        }

        .gender-item:hover {
            background: var(--bg-color);
            transform: translateY(-5px);
        }

        .gender-item i {
            font-size: 50px;
            margin-bottom: 10px;
        }

        .gender-item.boy i {
            color: #2196f3;
        }

        .gender-item.girl i {
            color: #e91e63;
        }

        .gender-item.male i {
            color: #3f51b5;
        }

        .gender-item.female i {
            color: #9c27b0;
        }

        /* Shapes Styles */
        .shape-object {
            transition: var(--transition);
            background-color: var(--primary-color);
        }

        .shape-circle {
            border-radius: 50%;
        }

        .shape-square {
            border-radius: 10px;
        }

        .shape-triangle {
            background-color: transparent !important;
            border-left: var(--tri-size) solid transparent;
            border-right: var(--tri-size) solid transparent;
            border-bottom: calc(var(--tri-size) * 1.7) solid var(--primary-color);
        }

        .size-big {
            width: 200px;
            height: 200px;
            --tri-size: 100px;
        }

        .size-small {
            width: 100px;
            height: 100px;
            --tri-size: 50px;
        }

        /* Canvas Color Swatch */
        .canvas-swatch {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            cursor: pointer;
            border: 3px solid transparent;
            transition: var(--transition);
        }

        .canvas-swatch:hover,
        .canvas-swatch.active {
            transform: scale(1.2);
            border-color: var(--text-main);
        }

        /* Unique Blob colors */
        .color-blob {
            border-radius: 40% 60% 70% 30% / 40% 50% 60% 50%;
            animation: blob-wobble 4s infinite alternate ease-in-out;
        }

        @keyframes blob-wobble {
            0% {
                border-radius: 40% 60% 70% 30% / 40% 50% 60% 50%;
                transform: scale(1);
            }

            100% {
                border-radius: 50% 50% 40% 60% / 50% 40% 50% 60%;
                transform: scale(1.05);
            }
        }

        /* Specific Extra Shapes */
        .shape-heart {
            background-color: transparent !important;
            position: relative;
            width: 100px;
            height: 100px;
        }

        .shape-heart::before,
        .shape-heart::after {
            content: "";
            position: absolute;
            top: 0;
            width: 50px;
            height: 80px;
            border-radius: 50px 50px 0 0;
            background: var(--primary-color);
        }

        .shape-heart::before {
            left: 50px;
            transform: rotate(-45deg);
            transform-origin: 0 100%;
        }

        .shape-heart::after {
            left: 0;
            transform: rotate(45deg);
            transform-origin: 100% 100%;
        }

        .shape-star {
            clip-path: polygon(50% 0%, 61% 35%, 98% 35%, 68% 57%, 79% 91%, 50% 70%, 21% 91%, 32% 57%, 2% 35%, 39% 35%);
        }

        .shape-hexagon {
            clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%);
        }

        .shape-oval {
            border-radius: 50% / 30%;
        }

        /* Body map pointer area */
        .body-map-container {
            position: relative;
            width: 300px;
            height: 500px;
            margin: 0 auto;
            background-image: url('https://upload.wikimedia.org/wikipedia/commons/thumb/c/cb/Boy_Icon.svg/480px-Boy_Icon.svg.png');
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center;
        }

        .body-pointer {
            position: absolute;
            background: var(--secondary-color);
            color: white;
            padding: 5px 15px;
            border-radius: 20px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: var(--card-shadow);
            transition: var(--transition);
        }

        .body-pointer:hover {
            transform: scale(1.1);
            background: var(--primary-color);
        }

        .body-pointer::after {
            content: "";
            position: absolute;
            width: 2px;
            height: 20px;
            background: var(--text-main);
            display: none;
        }
    </style>
</head>

<body>
    <nav id="top-nav">
        <div class="nav-left">
            <button id="btn-home" class="nav-btn" aria-label="Home" title="Home">
                <i class="fa-solid fa-house"></i>
            </button>
            <h1 class="nav-logo">Canvas Kids</h1>
        </div>
        <div class="nav-right">

            <button id="btn-sound" class="nav-btn" aria-label="Toggle Sound Effects" title="Toggle Sound">
                <i class="fa-solid fa-volume-high"></i>
            </button>
            <button id="btn-theme" class="nav-btn" aria-label="Toggle Theme" title="Toggle Theme">
                <i class="fa-solid fa-moon"></i>
            </button>
        </div>
    </nav>

    <main id="app-content">
        <!-- Welcome / Home Screen -->
        <section id="sec-home" class="view-section active">
            <div class="hero-header">
                <h2>Welcome to Canvas Kids!</h2>
                <p>Learn and play with fun sounds and colors.</p>
                <button class="primary-btn btn-bounce" id="btn-start"
                    onclick="CanvasKidsSpeak('Welcome to Canvas Kids! Choose an activity below!')">
                    <i class="fa-solid fa-play"></i> Start Learning
                </button>
            </div>
            <div class="sections-grid" id="main-menu-grid">
                <!-- Dynamically populated via script.js -->
            </div>
        </section>
    </main>

    <audio id="bgm-player" loop>
        <source src="https://assets.mixkit.co/music/preview/mixkit-funny-puppy-music-loop-2746.mp3" type="audio/mpeg">
    </audio>
    <script>
        /**
         * Canvas Kids - script.js
         * Clean, beginner-friendly Javascript for interactivity!
         */

        const AppState = {
            isBgmOn: false,
            isSoundOn: true,
            isDarkMode: false
        };

        // UI Elements
        const btnBgm = document.getElementById('btn-bgm');
        const btnSound = document.getElementById('btn-sound');
        const btnTheme = document.getElementById('btn-theme');
        const bgmPlayer = document.getElementById('bgm-player');

        // Category Data for Menu
        const categories = [
            { id: 'Alphabets', title: 'Alphabets', icon: 'fa-font', desc: 'A to Z learning', color: '#ff5e7e' },
            { id: 'Numbers', title: 'Numbers', icon: 'fa-list-ol', desc: 'Count 1 to 100', color: '#4dc2ff' },
            { id: 'Colors', title: 'Colors', icon: 'fa-palette', desc: 'Learn colors', color: '#ffc93c' },
          
            { id: 'Body', title: 'Body Parts', icon: 'fa-child-reaching', desc: 'Learn your body', color: '#5deb7a' },

            { id: 'Fruits', title: 'Fruits & Veggies', icon: 'fa-apple-whole', desc: 'Healthy food', color: '#e91e63' },
            { id: 'Occupations', title: 'Occupations', icon: 'fa-user-doctor', desc: 'Who does what?', color: '#3f51b5' },
            { id: 'Animals', title: 'Animals', icon: 'fa-paw', desc: 'Wild and tame', color: '#ff5722' },
            { id: 'Shapes', title: 'Shapes', icon: 'fa-shapes', desc: 'Circle, Square...', color: '#673ab7' },
            { id: 'Canvas', title: 'Magic Canvas', icon: 'fa-paintbrush', desc: 'Draw whatever!', color: '#00bcd4' },
            { id: 'Habits', title: 'Good Habits', icon: 'fa-hands-bubbles', desc: 'Daily routine', color: '#009688' },
            { id: 'Days', title: 'Days & Weather', icon: 'fa-cloud-sun', desc: 'Calendar & Sky', color: '#8bc34a' },
            { id: 'Game', title: 'Animal Matching Game', icon: 'fa-gamepad', desc: 'Memory Game', color: '#f44336' }
        ];

        document.addEventListener('DOMContentLoaded', () => {
            initMenu();
            initEventListeners();
        });

        function initMenu() {
            const menuGrid = document.getElementById('main-menu-grid');
            if (!menuGrid) return; // Only runs on index.html

            menuGrid.innerHTML = '';
            categories.forEach(cat => {
                const card = document.createElement('div');
                card.className = 'category-card';
                card.style.borderBottomColor = cat.color;

                card.innerHTML = `
            <i class="fa-solid ${cat.icon} main-icon" style="color: ${cat.color}"></i>
            <h3>${cat.title}</h3>
            <p>${cat.desc}</p>
        `;

                card.addEventListener('click', () => {
                    playClickSound();
                    speak(cat.title);
                    // Navigate to the correct page
                    setTimeout(() => {
                        window.location.href = cat.id + '.html';
                    }, 300);
                });

                menuGrid.appendChild(card);
            });
        }

        function initEventListeners() {
            if (btnTheme) {
                
        if (localStorage.getItem('canvasKidsTheme') === 'dark') {
            AppState.isDarkMode = true;
            document.body.classList.add('dark-theme');
            btnTheme.innerHTML = '<i class="fa-solid fa-sun"></i>';
        }
        btnTheme.addEventListener('click', () => {
                    playClickSound();
                    AppState.isDarkMode = !AppState.isDarkMode;
                    document.body.classList.toggle('dark-theme', AppState.isDarkMode);
                    btnTheme.innerHTML = AppState.isDarkMode ? '<i class="fa-solid fa-sun"></i>' : '<i class="fa-solid fa-moon"></i>';
                    localStorage.setItem('canvasKidsTheme', AppState.isDarkMode ? 'dark' : 'light');
                });
            }

            if (btnSound) {
                btnSound.addEventListener('click', () => {
                    AppState.isSoundOn = !AppState.isSoundOn;
                    if (AppState.isSoundOn) {
                        playClickSound();
                        btnSound.innerHTML = '<i class="fa-solid fa-volume-high"></i>';
                        btnSound.classList.remove('off');
                    } else {
                        btnSound.innerHTML = '<i class="fa-solid fa-volume-xmark"></i>';
                        btnSound.classList.add('off');
                        window.speechSynthesis.cancel();
                    }
                });
            }

            if (btnBgm) {
                btnBgm.addEventListener('click', () => {
                    playClickSound();
                    AppState.isBgmOn = !AppState.isBgmOn;
                    if (AppState.isBgmOn) {
                        bgmPlayer.play().catch(e => console.log(e));
                        btnBgm.innerHTML = '<i class="fa-solid fa-music"></i>';
                        btnBgm.classList.remove('off');
                    } else {
                        bgmPlayer.pause();
                        btnBgm.innerHTML = '<i class="fa-solid fa-music" style="opacity:0.5;"></i>';
                        btnBgm.classList.add('off');
                    }
                });
            }
        }

        // Speaks standard text using browser Web Speech API natively
        function speak(text) {
            if (!AppState.isSoundOn) return;
            if (!('speechSynthesis' in window)) return;

            window.speechSynthesis.cancel();

            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = 'en-US';
            utterance.rate = 0.9;
            utterance.pitch = 1.1;
            window.speechSynthesis.speak(utterance);
        }

        // Generate simple electronic button beep using AudioContext natively
        function playClickSound() {
            if (!AppState.isSoundOn) return;
            try {
                const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                const oscillator = audioCtx.createOscillator();
                const gainNode = audioCtx.createGain();

                oscillator.connect(gainNode);
                gainNode.connect(audioCtx.destination);

                oscillator.type = 'sine';
                oscillator.frequency.setValueAtTime(600, audioCtx.currentTime);
                oscillator.frequency.exponentialRampToValueAtTime(1000, audioCtx.currentTime + 0.1);

                gainNode.gain.setValueAtTime(0.1, audioCtx.currentTime);
                gainNode.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.1);

                oscillator.start();
                oscillator.stop(audioCtx.currentTime + 0.1);
            } catch (e) {
                console.log("Audio not supported");
            }
        }

        // Generate Canvas animation celebrating kid success
        function triggerConfetti() {
            if (!AppState.isSoundOn) return;
            const canvas = document.createElement('canvas');
            canvas.style.position = 'fixed';
            canvas.style.top = '0';
            canvas.style.left = '0';
            canvas.style.width = '100vw';
            canvas.style.height = '100vh';
            canvas.style.pointerEvents = 'none';
            canvas.style.zIndex = '9999';
            document.body.appendChild(canvas);

            const ctx = canvas.getContext('2d');
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;

            const pieces = [];
            const colors = ['#ff5e7e', '#4dc2ff', '#ffc93c', '#5deb7a', '#ffa500'];

            for (let i = 0; i < 100; i++) {
                pieces.push({
                    x: canvas.width / 2,
                    y: canvas.height / 2 + 100,
                    vx: (Math.random() - 0.5) * 20,
                    vy: (Math.random() - 1) * 20 - 5,
                    size: Math.random() * 10 + 5,
                    color: colors[Math.floor(Math.random() * colors.length)],
                    rotation: Math.random() * 360,
                    rs: (Math.random() - 0.5) * 10
                });
            }

            let opacity = 1;
            function animate() {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                let active = false;

                for (let p of pieces) {
                    p.x += p.vx;
                    p.y += p.vy;
                    p.vy += 0.5;
                    p.rotation += p.rs;

                    ctx.save();
                    ctx.translate(p.x, p.y);
                    ctx.rotate(p.rotation * Math.PI / 180);
                    ctx.fillStyle = p.color;
                    ctx.globalAlpha = opacity;
                    ctx.fillRect(-p.size / 2, -p.size / 2, p.size, p.size);
                    ctx.restore();

                    if (p.y < canvas.height) active = true;
                }
                if (active && opacity > 0) {
                    opacity -= 0.005;
                    requestAnimationFrame(animate);
                } else {
                    document.body.removeChild(canvas);
                }
            }
            animate();
        }

        window.CanvasKidsSpeak = speak;
        window.CanvasKidsConfetti = triggerConfetti;




    </script>
