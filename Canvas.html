
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Canvas Kids - Magic Canvas | Undo, Redo & Download</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body {
            font-family: 'Fredoka', sans-serif;
            background: linear-gradient(145deg, #f9eec1 0%, #f4e3b1 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            transition: background 0.2s ease;
        }

        /* Dark Theme */
        body.dark-theme {
            background: linear-gradient(145deg, #1a2a3a 0%, #0f1a24 100%);
        }

        body.dark-theme .visual-display-box,
        body.dark-theme .tools-panel,
        body.dark-theme .shape-panel,
        body.dark-theme .size-panel {
            background: #2d3e4b;
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.3);
            border-color: #ffb347;
        }

        body.dark-theme .primary-btn {
            background: #ff914d;
            color: #1e2f3a;
        }

        body.dark-theme .nav-btn {
            background: #ffb347;
            color: #1e2a36;
        }

        body.dark-theme .section-header {
            background: rgba(0, 0, 0, 0.4);
            color: #ffd966;
        }

        /* Navigation */
        #top-nav {
            background: #ffaa55;
            padding: 12px 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            box-shadow: 0 6px 0 #e07c2c;
            border-radius: 0 0 30px 30px;
            margin-bottom: 20px;
        }

        body.dark-theme #top-nav {
            background: #ff914d;
            box-shadow: 0 6px 0 #b85e1a;
        }

        .nav-left {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .nav-logo {
            font-size: 1.8rem;
            font-weight: 700;
            background: white;
            display: inline-block;
            padding: 5px 18px;
            border-radius: 50px;
            color: #ff8c42;
            letter-spacing: 1px;
            box-shadow: inset 0 -2px 0 #ffaa55;
        }

        .nav-right {
            display: flex;
            gap: 12px;
        }

        .nav-btn {
            background: white;
            border: none;
            font-size: 1.4rem;
            width: 48px;
            height: 48px;
            border-radius: 30px;
            cursor: pointer;
            transition: 0.1s linear;
            color: #ff8c42;
            box-shadow: 0 3px 0 #ccaa77;
        }

        .nav-btn:active {
            transform: translateY(2px);
            box-shadow: 0 1px 0 #ccaa77;
        }

        /* main section */
        .view-section {
            display: none;
            padding: 20px;
            max-width: 1200px;
            margin: 0 auto;
            width: 100%;
        }

        .view-section.active {
            display: block;
        }

        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            flex-wrap: wrap;
            margin-bottom: 20px;
            background: rgba(255, 235, 190, 0.7);
            padding: 8px 20px;
            border-radius: 60px;
            backdrop-filter: blur(3px);
        }

        .section-header h2 {
            font-size: 2rem;
            font-weight: 600;
            color: #ff7e33;
        }

        .visual-display-box {
            background: #fff6e5;
            border-radius: 48px;
            padding: 20px;
            box-shadow: 0 20px 30px rgba(0, 0, 0, 0.1);
            transition: 0.2s;
        }

        canvas {
            display: block;
            margin: 0 auto;
            cursor: crosshair;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
            background: white;
            width: 100%;
            height: auto;
            border-radius: 24px;
            touch-action: none;
        }

        /* Toolbar */
        .tools-row {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: center;
            gap: 20px;
            margin-top: 18px;
            margin-bottom: 10px;
        }

        .tools-panel,
        .shape-panel,
        .size-panel {
            background: #fffaee;
            padding: 10px 18px;
            border-radius: 60px;
            display: flex;
            align-items: center;
            gap: 15px;
            flex-wrap: wrap;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.05);
            border: 1px solid #ffcd94;
        }

        .color-circle {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            cursor: pointer;
            transition: transform 0.1s, border 0.1s;
            border: 3px solid white;
            box-shadow: 0 2px 6px rgba(0, 0, 0, 0.2);
        }

        .color-circle.active-color {
            transform: scale(1.15);
            border: 3px solid #333;
            box-shadow: 0 0 0 2px #ffaa44;
        }

        .color-circle:hover {
            transform: scale(1.05);
        }

        .tool-btn,
        .shape-btn,
        .undo-redo-btn {
            background: #ffe1b3;
            border: none;
            font-size: 1.6rem;
            width: 50px;
            height: 50px;
            border-radius: 30px;
            cursor: pointer;
            transition: 0.07s linear;
            color: #a5562c;
        }

        .tool-btn.active-tool,
        .shape-btn.active-shape {
            background: #ff9f4a;
            color: white;
            box-shadow: inset 0 1px 2px rgba(0, 0, 0, 0.2);
            transform: scale(0.97);
        }

        .undo-redo-btn:active {
            transform: scale(0.95);
        }

        .size-control {
            display: flex;
            align-items: center;
            gap: 12px;
            background: #ffefcf;
            padding: 5px 15px;
            border-radius: 40px;
        }

        .size-value {
            font-weight: bold;
            font-size: 1.3rem;
            min-width: 45px;
            text-align: center;
            background: white;
            padding: 5px 10px;
            border-radius: 30px;
        }

        .size-btn {
            background: #ffb86b;
            border: none;
            width: 38px;
            height: 38px;
            border-radius: 50%;
            font-size: 1.4rem;
            font-weight: bold;
            cursor: pointer;
            color: #3b2a1f;
        }

        .fill-toggle {
            background: #ffe0b5;
            border-radius: 40px;
            padding: 5px 16px;
            display: flex;
            align-items: center;
            gap: 8px;
            font-weight: 600;
        }

        .fill-toggle button {
            background: #ffaa55;
            border: none;
            padding: 8px 14px;
            border-radius: 40px;
            font-family: 'Fredoka', sans-serif;
            font-weight: bold;
            cursor: pointer;
        }

        .primary-btn {
            background: #ff914d;
            border: none;
            padding: 12px 28px;
            border-radius: 40px;
            font-family: 'Fredoka', sans-serif;
            font-size: 1.1rem;
            font-weight: bold;
            color: white;
            cursor: pointer;
            transition: 0.07s linear;
            box-shadow: 0 3px 0 #b85e1a;
            display: inline-flex;
            align-items: center;
            gap: 10px;
        }

        .primary-btn:active {
            transform: translateY(2px);
            box-shadow: 0 1px 0 #b85e1a;
        }

        .download-group {
            display: flex;
            gap: 15px;
            justify-content: center;
            flex-wrap: wrap;
            margin-top: 20px;
        }

        .undo-redo-group {
            display: flex;
            gap: 10px;
            margin-left: 10px;
        }

        @media (max-width: 700px) {

            .tools-panel,
            .shape-panel,
            .size-panel {
                padding: 8px 12px;
                gap: 8px;
            }

            .color-circle {
                width: 36px;
                height: 36px;
            }

            .tool-btn,
            .shape-btn,
            .undo-redo-btn {
                width: 44px;
                height: 44px;
                font-size: 1.3rem;
            }
        }
    </style>
</head>

<body>
    <nav id="top-nav">
        <div class="nav-left">
            <button id="btn-home" class="nav-btn" onclick="window.location.href='index.html'" aria-label="Home"
                title="Home"><i class="fa-solid fa-house"></i></button>
            <h1 class="nav-logo">Canvas Kids</h1>
        </div>
        <div class="nav-right">
            <button id="btn-bgm" class="nav-btn"><i class="fa-solid fa-music"></i></button>
            <button id="btn-sound" class="nav-btn"><i class="fa-solid fa-volume-high"></i></button>
            <button id="btn-theme" class="nav-btn"><i class="fa-solid fa-moon"></i></button>
        </div>
    </nav>
    <main id="app-content">
        <section id="sec-canvas" class="view-section active">
            <div class="section-header">
                <h2>✨ Magic Canvas ✨</h2>
                <button class="nav-btn btn-bounce"
                    onclick="if(window.CanvasKidsSpeak) CanvasKidsSpeak('Draw anything you like!')"><i
                        class="fa-solid fa-repeat"></i></button>
            </div>
            <div class="visual-display-box">
                <!-- Color Palette -->
                <div style="display:flex; justify-content:center; gap:12px; margin-bottom: 15px; flex-wrap: wrap;"
                    id="canvas-colors"></div>

                <!-- Tools Panel with Undo/Redo -->
                <div class="tools-row">
                    <div class="tools-panel">
                        <button class="tool-btn" id="tool-brush" title="Brush (Pen/Pencil)"><i
                                class="fa-solid fa-paintbrush"></i></button>
                        <button class="tool-btn" id="tool-fill" title="Bucket Fill"><i
                                class="fa-solid fa-fill-drip"></i></button>
                        <button class="tool-btn" id="tool-eraser" title="Eraser"><i
                                class="fa-solid fa-eraser"></i></button>
                    </div>
                    <div class="shape-panel">
                        <button class="shape-btn" id="shape-free" title="Free Draw (Pen)"><i
                                class="fa-solid fa-pen-fancy"></i></button>
                        <button class="shape-btn" id="shape-rect" title="Rectangle"><i
                                class="fa-regular fa-square"></i></button>
                        <button class="shape-btn" id="shape-circle" title="Circle"><i
                                class="fa-regular fa-circle"></i></button>
                        <button class="shape-btn" id="shape-line" title="Line"><i
                                class="fa-solid fa-slash"></i></button>
                    </div>
                    <div class="size-panel">
                        <div class="size-control">
                            <button class="size-btn" id="size-minus">-</button>
                            <span class="size-value" id="brush-size-val">5</span>
                            <button class="size-btn" id="size-plus">+</button>
                        </div>
                        <div class="fill-toggle">
                            <span>🎨 Fill Shape</span>
                            <button id="toggle-fill-btn" style="background:#ffaa55;">OFF</button>
                        </div>
                    </div>
                    <div class="undo-redo-group">
                        <button class="undo-redo-btn" id="undo-btn" title="Undo"><i
                                class="fa-solid fa-undo"></i></button>
                        <button class="undo-redo-btn" id="redo-btn" title="Redo"><i
                                class="fa-solid fa-redo"></i></button>
                    </div>
                </div>

                <!-- Canvas Drawing Area -->
                <canvas id="kids-canvas" width="900" height="450"
                    style="border: 4px solid #ffb347; border-radius: 32px; background: #fff; touch-action: none; width:100%; height:auto; cursor: crosshair;"></canvas>

                <!-- Buttons: Clear & Download -->
                <div class="download-group">
                    <button class="primary-btn" id="clear-btn">
                        <i class="fa-solid fa-trash"></i> Clear Canvas
                    </button>
                    <button class="primary-btn" id="download-png-btn">
                        <i class="fa-solid fa-image"></i> Download as PNG
                    </button>
                </div>
            </div>
        </section>
    </main>
    <audio id="bgm-player" loop>
        <source src="https://assets.mixkit.co/music/preview/mixkit-funny-puppy-music-loop-2746.mp3" type="audio/mpeg">
    </audio>
    <script>
        // ========== DOM Elements ==========
        const canvas = document.getElementById('kids-canvas');
        const ctx = canvas.getContext('2d');

        // Set canvas dimensions
        canvas.width = 900;
        canvas.height = 450;

        // Initialize with white background
        ctx.fillStyle = '#FFFFFF';
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        // ========== UNDO / REDO STACKS ==========
        let undoStack = [];
        let redoStack = [];
        const MAX_STACK_SIZE = 50;

        // Save current canvas state to undo stack
        function saveToUndo() {
            const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
            undoStack.push(imageData);
            // Limit stack size
            if (undoStack.length > MAX_STACK_SIZE) {
                undoStack.shift();
            }
            // Clear redo stack when new action is performed
            redoStack = [];
        }

        // Undo last action
        function undo() {
            if (undoStack.length === 0) {
                playPopSound();
                if (soundEnabled) CanvasKidsSpeak('Nothing to undo');
                return;
            }
            // Save current state to redo before undo
            const currentState = ctx.getImageData(0, 0, canvas.width, canvas.height);
            redoStack.push(currentState);
            if (redoStack.length > MAX_STACK_SIZE) {
                redoStack.shift();
            }
            // Restore last state
            const lastState = undoStack.pop();
            ctx.putImageData(lastState, 0, 0);
            playPopSound();
            if (soundEnabled) CanvasKidsSpeak('Undo');
        }

        // Redo last undone action
        function redo() {
            if (redoStack.length === 0) {
                playPopSound();
                if (soundEnabled) CanvasKidsSpeak('Nothing to redo');
                return;
            }
            // Save current to undo
            const currentState = ctx.getImageData(0, 0, canvas.width, canvas.height);
            undoStack.push(currentState);
            if (undoStack.length > MAX_STACK_SIZE) {
                undoStack.shift();
            }
            // Restore from redo
            const redoState = redoStack.pop();
            ctx.putImageData(redoState, 0, 0);
            playPopSound();
            if (soundEnabled) CanvasKidsSpeak('Redo');
        }

        // Clear canvas and save to undo
        function clearCanvas() {
            saveToUndo();
            ctx.fillStyle = '#FFFFFF';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            playPopSound();
            if (soundEnabled) CanvasKidsSpeak('Canvas cleared!');
        }

        // Download as PNG
        function downloadAsPNG() {
            try {
                const link = document.createElement('a');
                link.download = 'my_drawing.png';
                link.href = canvas.toDataURL('image/png');
                link.click();
                playPopSound();
                if (soundEnabled) CanvasKidsSpeak('Drawing saved as PNG!');
            } catch (error) {
                console.error('Download error:', error);
                if (soundEnabled) CanvasKidsSpeak('Sorry, could not save drawing');
            }
        }

        // Drawing state variables
        let drawing = false;
        let lastX = 0, lastY = 0;
        let currentTool = 'brush';   // 'brush', 'fill', 'eraser'
        let currentShape = 'free';    // 'free', 'rect', 'circle', 'line'
        let currentColor = '#FF4785';
        let brushSize = 5;
        let fillShapes = false;

        // For shape drawing
        let startX = 0, startY = 0;
        let previewState = null;

        // Color palette
        const colorPalette = [
            '#FF4785', '#FFB347', '#3B9EFF', '#47D147', '#FF5733', '#C13584',
            '#00CED1', '#FFD966', '#8E44AD', '#2C3E50', '#E67E22', '#1ABC9C',
            '#000000', '#FFFFFF'
        ];

        // Audio & Theme state
        const bgmAudio = document.getElementById('bgm-player');
        let bgmPlaying = false;
        let soundEnabled = true;

        // ========== Helper Functions ==========
        function playPopSound() {
            if (soundEnabled) {
                try {
                    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                    const oscillator = audioCtx.createOscillator();
                    const gainNode = audioCtx.createGain();
                    oscillator.connect(gainNode);
                    gainNode.connect(audioCtx.destination);
                    oscillator.frequency.value = 880;
                    gainNode.gain.value = 0.08;
                    oscillator.start();
                    gainNode.gain.exponentialRampToValueAtTime(0.00001, audioCtx.currentTime + 0.2);
                    oscillator.stop(audioCtx.currentTime + 0.2);
                    audioCtx.resume();
                } catch (e) { }
            }
        }

        window.CanvasKidsSpeak = function (msg) {
            if (soundEnabled && window.speechSynthesis) {
                const utterance = new SpeechSynthesisUtterance(msg);
                utterance.lang = 'en-US';
                utterance.rate = 1;
                window.speechSynthesis.cancel();
                window.speechSynthesis.speak(utterance);
            }
        };

        // Save preview state for shape drawing
        function savePreviewState() {
            previewState = ctx.getImageData(0, 0, canvas.width, canvas.height);
        }

        function restorePreviewState() {
            if (previewState) {
                ctx.putImageData(previewState, 0, 0);
            }
        }

        // ========== SMOOTH BRUSH DRAWING ==========
        function startDrawLine(x, y) {
            ctx.beginPath();
            ctx.moveTo(x, y);
            ctx.lineCap = 'round';
            ctx.lineJoin = 'round';
            ctx.lineWidth = brushSize;

            if (currentTool === 'eraser') {
                ctx.globalCompositeOperation = 'destination-out';
                ctx.strokeStyle = '#FFFFFF';
            } else {
                ctx.globalCompositeOperation = 'source-over';
                ctx.strokeStyle = currentColor;
            }
            ctx.lineTo(x, y);
            ctx.stroke();
            lastX = x;
            lastY = y;
        }

        function drawSmoothLine(x, y) {
            ctx.beginPath();
            ctx.moveTo(lastX, lastY);
            ctx.lineTo(x, y);
            ctx.lineCap = 'round';
            ctx.lineJoin = 'round';
            ctx.lineWidth = brushSize;

            if (currentTool === 'eraser') {
                ctx.globalCompositeOperation = 'destination-out';
                ctx.strokeStyle = '#FFFFFF';
            } else {
                ctx.globalCompositeOperation = 'source-over';
                ctx.strokeStyle = currentColor;
            }
            ctx.stroke();
            lastX = x;
            lastY = y;
        }

        // ========== Flood Fill ==========
        function getPixelColor(data, x, y) {
            const index = (y * canvas.width + x) * 4;
            if (index >= data.length) return null;
            return { r: data[index], g: data[index + 1], b: data[index + 2], a: data[index + 3] };
        }

        function setPixelColor(data, x, y, rgb) {
            const index = (y * canvas.width + x) * 4;
            data[index] = rgb.r;
            data[index + 1] = rgb.g;
            data[index + 2] = rgb.b;
            data[index + 3] = 255;
        }

        function colorMatch(c1, c2) {
            return Math.abs(c1.r - c2.r) < 5 && Math.abs(c1.g - c2.g) < 5 && Math.abs(c1.b - c2.b) < 5;
        }

        function hexToRgb(hex) {
            let r, g, b;
            if (hex.startsWith('#')) {
                r = parseInt(hex.slice(1, 3), 16);
                g = parseInt(hex.slice(3, 5), 16);
                b = parseInt(hex.slice(5, 7), 16);
            } else {
                r = g = b = 0;
            }
            return { r, g, b };
        }

        function floodFill(x, y, fillColor) {
            saveToUndo();
            const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
            const data = imageData.data;
            const targetColor = getPixelColor(data, x, y);
            const fillRGB = hexToRgb(fillColor);
            if (!targetColor) return;
            if (colorMatch(targetColor, fillRGB)) return;

            const stack = [{ x, y }];
            const visited = new Set();
            const width = canvas.width;
            const height = canvas.height;

            while (stack.length) {
                const { x: px, y: py } = stack.pop();
                const key = `${px},${py}`;
                if (px < 0 || px >= width || py < 0 || py >= height) continue;
                if (visited.has(key)) continue;
                const current = getPixelColor(data, px, py);
                if (!current) continue;
                if (!colorMatch(current, targetColor)) continue;
                visited.add(key);
                setPixelColor(data, px, py, fillRGB);
                stack.push({ x: px + 1, y: py }, { x: px - 1, y: py }, { x: px, y: py + 1 }, { x: px, y: py - 1 });
            }
            ctx.putImageData(imageData, 0, 0);
        }

        // ========== Shape Drawing ==========
        function drawShape(type, x1, y1, x2, y2, fill) {
            saveToUndo();
            ctx.beginPath();
            ctx.lineWidth = brushSize;
            ctx.strokeStyle = currentColor;
            if (fill && type !== 'line') {
                ctx.fillStyle = currentColor;
            }
            if (type === 'rect') {
                const w = x2 - x1;
                const h = y2 - y1;
                if (fill) ctx.fillRect(x1, y1, w, h);
                ctx.strokeRect(x1, y1, w, h);
            } else if (type === 'circle') {
                const radius = Math.sqrt(Math.pow(x2 - x1, 2) + Math.pow(y2 - y1, 2));
                ctx.arc(x1, y1, radius, 0, Math.PI * 2);
                if (fill) ctx.fill();
                ctx.stroke();
            } else if (type === 'line') {
                ctx.beginPath();
                ctx.moveTo(x1, y1);
                ctx.lineTo(x2, y2);
                ctx.stroke();
            }
        }

        // ========== Canvas Event Handlers ==========
        function getCanvasCoords(e) {
            const rect = canvas.getBoundingClientRect();
            const scaleX = canvas.width / rect.width;
            const scaleY = canvas.height / rect.height;
            let clientX, clientY;
            if (e.touches) {
                clientX = e.touches[0].clientX;
                clientY = e.touches[0].clientY;
            } else {
                clientX = e.clientX;
                clientY = e.clientY;
            }
            let canvasX = (clientX - rect.left) * scaleX;
            let canvasY = (clientY - rect.top) * scaleY;
            canvasX = Math.min(Math.max(0, canvasX), canvas.width);
            canvasY = Math.min(Math.max(0, canvasY), canvas.height);
            return { mx: canvasX, my: canvasY };
        }

        function startDrawing(e) {
            e.preventDefault();
            const { mx, my } = getCanvasCoords(e);

            if (currentTool === 'fill') {
                floodFill(Math.floor(mx), Math.floor(my), currentColor);
                playPopSound();
                return;
            }

            drawing = true;

            if (currentShape === 'free') {
                saveToUndo();
                ctx.globalCompositeOperation = (currentTool === 'eraser') ? 'destination-out' : 'source-over';
                startDrawLine(mx, my);
            } else {
                startX = mx;
                startY = my;
                savePreviewState();
            }
        }

        function drawMoving(e) {
            if (!drawing) return;
            e.preventDefault();
            const { mx, my } = getCanvasCoords(e);

            if (currentShape === 'free') {
                drawSmoothLine(mx, my);
            } else if (currentShape !== 'free') {
                restorePreviewState();
                ctx.beginPath();
                ctx.lineWidth = brushSize;
                ctx.strokeStyle = currentColor;
                const fillActive = fillShapes && (currentShape !== 'line');
                if (fillActive && currentShape !== 'line') ctx.fillStyle = currentColor;

                if (currentShape === 'rect') {
                    const w = mx - startX;
                    const h = my - startY;
                    if (fillActive) ctx.fillRect(startX, startY, w, h);
                    ctx.strokeRect(startX, startY, w, h);
                } else if (currentShape === 'circle') {
                    const radius = Math.sqrt(Math.pow(mx - startX, 2) + Math.pow(my - startY, 2));
                    ctx.arc(startX, startY, radius, 0, Math.PI * 2);
                    if (fillActive) ctx.fill();
                    ctx.stroke();
                } else if (currentShape === 'line') {
                    ctx.beginPath();
                    ctx.moveTo(startX, startY);
                    ctx.lineTo(mx, my);
                    ctx.stroke();
                }
            }
        }

        function endDrawing(e) {
            if (!drawing) return;
            e.preventDefault();

            if (currentShape !== 'free' && drawing) {
                const { mx, my } = getCanvasCoords(e);
                drawShape(currentShape, startX, startY, mx, my, fillShapes && currentShape !== 'line');
                playPopSound();
            } else if (currentShape === 'free') {
                playPopSound();
            }
            drawing = false;
            ctx.globalCompositeOperation = 'source-over';
        }

        // ========== UI Functions ==========
        function buildColorPicker() {
            const container = document.getElementById('canvas-colors');
            container.innerHTML = '';
            colorPalette.forEach(col => {
                const colorDiv = document.createElement('div');
                colorDiv.className = 'color-circle';
                colorDiv.style.backgroundColor = col;
                if (col === '#FFFFFF') colorDiv.style.border = '1px solid #ccc';
                if (col === currentColor) colorDiv.classList.add('active-color');
                colorDiv.addEventListener('click', () => {
                    currentColor = col;
                    document.querySelectorAll('.color-circle').forEach(c => c.classList.remove('active-color'));
                    colorDiv.classList.add('active-color');
                    if (currentTool === 'eraser') {
                        currentTool = 'brush';
                        updateToolActiveUI();
                    }
                    playPopSound();
                });
                container.appendChild(colorDiv);
            });
        }

        function updateToolActiveUI() {
            document.getElementById('tool-brush').classList.toggle('active-tool', currentTool === 'brush');
            document.getElementById('tool-fill').classList.toggle('active-tool', currentTool === 'fill');
            document.getElementById('tool-eraser').classList.toggle('active-tool', currentTool === 'eraser');
        }

        function updateShapeUI() {
            document.getElementById('shape-free').classList.toggle('active-shape', currentShape === 'free');
            document.getElementById('shape-rect').classList.toggle('active-shape', currentShape === 'rect');
            document.getElementById('shape-circle').classList.toggle('active-shape', currentShape === 'circle');
            document.getElementById('shape-line').classList.toggle('active-shape', currentShape === 'line');
        }

        function setBrushSize(value) {
            brushSize = Math.min(20, Math.max(1, value));
            document.getElementById('brush-size-val').innerText = brushSize;
        }

        // ========== Event Listeners ==========
        function initEvents() {
            canvas.addEventListener('mousedown', startDrawing);
            window.addEventListener('mousemove', drawMoving);
            window.addEventListener('mouseup', endDrawing);
            canvas.addEventListener('touchstart', startDrawing, { passive: false });
            canvas.addEventListener('touchmove', drawMoving, { passive: false });
            canvas.addEventListener('touchend', endDrawing);
        }

        function initTools() {
            document.getElementById('tool-brush').addEventListener('click', () => {
                currentTool = 'brush';
                updateToolActiveUI();
                playPopSound();
            });
            document.getElementById('tool-fill').addEventListener('click', () => {
                currentTool = 'fill';
                updateToolActiveUI();
                playPopSound();
            });
            document.getElementById('tool-eraser').addEventListener('click', () => {
                currentTool = 'eraser';
                updateToolActiveUI();
                playPopSound();
            });
            document.getElementById('shape-free').addEventListener('click', () => {
                currentShape = 'free';
                updateShapeUI();
                playPopSound();
            });
            document.getElementById('shape-rect').addEventListener('click', () => {
                currentShape = 'rect';
                updateShapeUI();
                playPopSound();
            });
            document.getElementById('shape-circle').addEventListener('click', () => {
                currentShape = 'circle';
                updateShapeUI();
                playPopSound();
            });
            document.getElementById('shape-line').addEventListener('click', () => {
                currentShape = 'line';
                updateShapeUI();
                playPopSound();
            });
            document.getElementById('size-plus').addEventListener('click', () => {
                setBrushSize(brushSize + 1);
                playPopSound();
            });
            document.getElementById('size-minus').addEventListener('click', () => {
                setBrushSize(brushSize - 1);
                playPopSound();
            });

            const toggleFillBtn = document.getElementById('toggle-fill-btn');
            toggleFillBtn.addEventListener('click', () => {
                fillShapes = !fillShapes;
                toggleFillBtn.innerText = fillShapes ? 'ON' : 'OFF';
                toggleFillBtn.style.background = fillShapes ? '#6fbf4c' : '#ffaa55';
                playPopSound();
            });

            // Undo/Redo buttons
            document.getElementById('undo-btn').addEventListener('click', undo);
            document.getElementById('redo-btn').addEventListener('click', redo);

            // Clear and Download buttons
            document.getElementById('clear-btn').addEventListener('click', clearCanvas);
            document.getElementById('download-png-btn').addEventListener('click', downloadAsPNG);
        }

        function initThemeAndAudio() {
            const btnBgm = document.getElementById('btn-bgm');
            const btnSound = document.getElementById('btn-sound');
            const btnTheme = document.getElementById('btn-theme');

            btnBgm.addEventListener('click', () => {
                if (bgmPlaying) {
                    bgmAudio.pause();
                    bgmPlaying = false;
                    btnBgm.style.opacity = '0.6';
                } else {
                    bgmAudio.play().catch(() => { });
                    bgmPlaying = true;
                    btnBgm.style.opacity = '1';
                }
            });

            btnSound.addEventListener('click', () => {
                soundEnabled = !soundEnabled;
                btnSound.innerHTML = soundEnabled ? '<i class="fa-solid fa-volume-high"></i>' : '<i class="fa-solid fa-volume-xmark"></i>';
                if (soundEnabled) CanvasKidsSpeak('Sound on!');
            });

            btnTheme.addEventListener('click', () => {
                document.body.classList.toggle('dark-theme');
                const isDark = document.body.classList.contains('dark-theme');
                btnTheme.innerHTML = isDark ? '<i class="fa-solid fa-sun"></i>' : '<i class="fa-solid fa-moon"></i>';
            });
        }

        // ========== Initialize ==========
        function initialize() {
            buildColorPicker();
            initEvents();
            initTools();
            initThemeAndAudio();
            setBrushSize(5);
            updateToolActiveUI();
            updateShapeUI();
            // Save initial empty state to undo
            saveToUndo();
            // Welcome message
            setTimeout(() => {
                if (soundEnabled) CanvasKidsSpeak('Welcome to Magic Canvas! Draw with the pen tool. Use Undo and Redo buttons.');
            }, 500);
        }

        initialize();
    </script>
</body>

</html>
